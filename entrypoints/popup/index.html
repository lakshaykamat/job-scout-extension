<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Scout</title>
    <link rel="stylesheet" href="/src/styles/styles.css">
  </head>
  <body class="popup-body">
    <main class="shell space-y-4">
      <header class="panel overflow-hidden">
        <div class="bg-ink px-4 py-4 text-white">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h1 class="text-xl font-black tracking-tight">Job Scout</h1>
              <p id="pageStatus" class="mt-1 text-xs text-stone-300">Checking tab...</p>
            </div>
            <button id="optionsButton" class="rounded-md bg-white/10 px-3 py-2 text-xs font-bold text-white hover:bg-white/20" type="button">
              Settings
            </button>
          </div>
        </div>

        <div class="space-y-3 p-4">
          <label class="field-label">
            Scan profile
            <select id="profileSelect" class="field-input"></select>
          </label>
          <p id="profileHint" class="text-xs leading-5 text-stone-600"></p>
          <div class="grid grid-cols-2 gap-2">
            <button id="startButton" class="button-primary" type="button">Start scan</button>
            <button id="stopButton" class="button-secondary" type="button">Stop</button>
          </div>
        </div>
      </header>

      <section class="panel p-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-wide text-stone-500">Status</p>
            <strong id="scanStatus" class="text-lg">Idle</strong>
          </div>
          <span id="activeProfileName" class="rounded-full bg-mint px-3 py-1 text-xs font-bold text-moss">No profile</span>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-2">
          <div class="stat-box">
            <strong id="postCount" class="block text-xl">0</strong>
            <span class="text-xs text-stone-500">saved</span>
          </div>
          <div class="stat-box">
            <strong id="checkedCount" class="block text-xl">0</strong>
            <span class="text-xs text-stone-500">checked</span>
          </div>
          <div class="stat-box">
            <strong id="savedResultCount" class="block text-xl">0</strong>
            <span class="text-xs text-stone-500">matched</span>
          </div>
        </div>
        <div id="scanActivity" class="mt-3 rounded-md border border-line bg-white p-3 text-xs leading-5 text-stone-600">
          No scan running.
        </div>
        <p id="errorText" class="mt-3 rounded-md bg-red-50 p-2 text-xs leading-5 text-red-700" hidden></p>
      </section>

      <section class="grid grid-cols-[1fr_1fr_auto] gap-2">
        <button id="viewPostsButton" class="button-primary col-span-3" type="button">View opportunities</button>
        <button id="exportJsonButton" class="button-secondary" type="button">JSON</button>
        <button id="exportCsvButton" class="button-secondary" type="button">CSV</button>
        <button id="clearButton" class="button-ghost" type="button">Clear</button>
      </section>

      <section>
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-sm font-black uppercase tracking-wide">Saved opportunities</h2>
          <span id="resultCount" class="rounded-full bg-stone-200 px-2 py-0.5 text-xs font-bold text-stone-600">0</span>
        </div>
        <div id="resultsList" class="max-h-72 space-y-2 overflow-auto pr-1"></div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
